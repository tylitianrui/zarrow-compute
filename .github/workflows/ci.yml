name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zig:
    name: Zig ${{ matrix.zig-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zig-version:
          - 0.15.0
          - 0.15.1
          - 0.15.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig-version }}

      - name: Zig Version
        run: zig version

      - name: Refresh zarrow master hash
        run: |
          set -euo pipefail
          ZARROW_HASH="$(zig fetch --global-cache-dir "${{ runner.temp }}/zig-global-cache" https://github.com/tylitianrui/zarrow/archive/refs/heads/master.tar.gz)"
          perl -0pi -e 's#(\.url = "https://github.com/tylitianrui/zarrow/archive/refs/heads/master\.tar\.gz",\s*\n\s*\.hash = ")[^"]+(")#$1'"${ZARROW_HASH}"'$2#' build.zig.zon
          echo "ZARROW_HASH=${ZARROW_HASH}" >> "$GITHUB_ENV"
          echo "Using zarrow hash: ${ZARROW_HASH}"

      - name: Lint (zig fmt check)
        run: zig fmt --check build.zig src examples

      - name: Workaround zarrow v0.0.2 build script on Zig 0.15.0/0.15.1
        if: matrix.zig-version == '0.15.0' || matrix.zig-version == '0.15.1'
        run: |
          set -euo pipefail
          perl -0pi -e 's/std\.fs\.openDirAbsolute\(examples_dir\.getPath\(b\), \.\{ \.iterate = true \}\)/std.fs.cwd().openDir(examples_dir.getPath(b), .{ .iterate = true })/g' "${{ runner.temp }}/zig-global-cache/p/${ZARROW_HASH}/build.zig"

      - name: Run Tests
        run: zig build --cache-dir "${{ github.workspace }}/.zig-cache" --global-cache-dir "${{ runner.temp }}/zig-global-cache" test

      - name: Run Examples
        run: zig build --cache-dir "${{ github.workspace }}/.zig-cache" --global-cache-dir "${{ runner.temp }}/zig-global-cache" examples
